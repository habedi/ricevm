site_name: RiceVM Documentation
site_description: A Dis virtual machine and Limbo compiler in Rust
repo_url: https://github.com/habedi/ricevm
repo_name: habedi/ricevm
site_url: https://habedi.github.io/ricevm/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - content.code.select
    - content.code.annotate
    - navigation.tracking

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/habedi/ricevm

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples: examples.md
  - API Reference: api-reference.md
  - Current Limitations: limitations.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - attr_list
  - toc:
      permalink: true
